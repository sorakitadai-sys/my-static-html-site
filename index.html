<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンバー一覧表</title>
    <style>
        body {
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            background-color: #ffffff;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
 
        table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            font-size: 18px;
            letter-spacing: 0.5px;
        }
 
        /* セルの余白と配置設定 */
        td {
            padding: 15px 10px;
            vertical-align: middle;
        }
 
        /* 奇数行（1, 3, 5...）は白色 */
        tr:nth-child(odd) {
            background-color: #ffffff;
        }
 
        /* 偶数行（2, 4, 6...）は薄い青色 */
        tr:nth-child(even) {
            background-color: #f2f7fc;
        }
 
        /* 各列の幅や文字の配置を画像に合わせる */
        .col-num {
            width: 50px;
            text-align: center;
            font-weight: 500;
        }
 
        .col-name a {
            color: inherit;
            text-decoration: none;
        }
 
        .col-pref {
            width: 120px;
            text-align: left;
            padding-left: 20px;
        }
 
        .col-age {
            width: 80px;
            text-align: left;
        }
 
        .col-date {
            width: 120px;
            text-align: left;
        }
 
        .col-blood {
            width: 80px;
            text-align: left;
        }
    </style>
</head>
